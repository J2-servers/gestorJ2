# Stack completa Gestor J2 â€” pronta para EasyPanel ou VPS com Docker.
# Rode com: docker compose up -d --build
# VariÃ¡veis vÃªm de um arquivo .env ao lado deste (veja .env.production.example).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestorj2}
      POSTGRES_USER: ${POSTGRES_USER:-gestorj2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestorj2}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestorj2}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gestorj2}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET forte no .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-gestorj2}
      WHATSAPP_MIN_DELAY_MS: ${WHATSAPP_MIN_DELAY_MS:-15000}
      WHATSAPP_MAX_DELAY_MS: ${WHATSAPP_MAX_DELAY_MS:-75000}
      WHATSAPP_MIN_SEND_INTERVAL_MS: ${WHATSAPP_MIN_SEND_INTERVAL_MS:-20000}
      WHATSAPP_RETRY_BASE_DELAY_MS: ${WHATSAPP_RETRY_BASE_DELAY_MS:-120000}
      WHATSAPP_MAX_PER_MINUTE: ${WHATSAPP_MAX_PER_MINUTE:-3}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@gestorj2.local}
      UPLOAD_DIR: storage/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      SEED_ON_START: ${SEED_ON_START:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_RECOVERY_PASSWORD: ${SEED_RECOVERY_PASSWORD:-}
      SEED_RESELLER_PASSWORD: ${SEED_RESELLER_PASSWORD:-}
      SEED_RESET_PASSWORDS: ${SEED_RESET_PASSWORDS:-false}
    volumes:
      - uploads_data:/app/storage/uploads

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:

