services:
  postgres:
    image: postgres:16-alpine
    container_name: gestorj2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestorj2
      POSTGRES_USER: gestorj2
      POSTGRES_PASSWORD: gestorj2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gestorj2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:


